<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>晨光咖啡馆 | 品牌海报</title>
  <style>
    :root{
      /* 主题与可读性相关变量（暖色系） */
      --coffee-deep:#5a3a2b;         /* 深咖色（标题） */
      --coffee-soft:#8b5e3c;         /* 柔和咖棕（副标题） */
      --warm-gold:#d8b070;           /* 暖金色高光 */
      --safe-gap:60px;               /* 设计建议的安全边距 */
    }

    /* 页面基底：避免页面出现滚动条，统一以视口内自适应缩放呈现整张海报 */
html, body {
  height: auto;
  overflow-y: auto;
}
.stage {
  height: auto;
  min-height: 100vh;
}

    /* 海报画布：9:16 竖版，随视口缩放，最大不超过1080×1920 */
    .poster{
      position:relative;
      width:min(100vw, 1080px);
      aspect-ratio: 9 / 16;
      max-height: min(100vh, 1920px);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(90,58,43,0.25);
      background: #f3e7d9;
      outline: 1px solid rgba(90,58,43,0.06);
    }

    /* 背景主图：完整覆盖，维持构图留白；加入轻微暖色渐变增强文字可读性 */
    .bg{
      position:absolute;
      inset:0;
      overflow:hidden;
    }
    .bg img{
      position:absolute;
      width:100%;
      height:100%;
      object-fit: cover;       /* 保证主图完整铺满 */
      object-position: center; /* 居中构图，便于上方留白叠字 */
      filter: saturate(1.05) contrast(0.98) brightness(1.02);
    }
    /* 暖色顶光与下部柔影，提高层次与文字对比，不是“文字背景块” */
    .bg::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,233,200,0.45) 0%, rgba(255,233,200,0.10) 38%, rgba(0,0,0,0.08) 100%);
      pointer-events:none;
    }

    /* 内容安全区：四周保持建议的60px边距 */
    .content{
      position:relative;
      height:100%;
      padding: var(--safe-gap);
      display:flex;
      flex-direction: column;
      justify-content: flex-start;  /* 文字靠上，符合“上1/4~1/3”建议 */
      align-items: center;
      text-align:center;
    }

    header{
      width:100%;
      margin-top: clamp(28px, 6vh, 96px); /* 让标题处于画面上方1/4~1/3区间的动态范围 */
    }

    /* 店名：温馨精致，高识别度；使用多重阴影模拟轻浮雕与暖金高光 */
    .brand{
      margin:0;
      line-height:1.1;
      color: var(--coffee-deep);
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: clamp(48px, 9.2vw, 150px); /* 约120–160px上限，随视口缩放 */
      text-shadow:
        0 1px 0 rgba(255,255,255,0.35),
        0 2px 6px rgba(90,58,43,0.25),
        0 0 24px rgba(216,176,112,0.45);
    }

    /* 副标题/短文案：亲切圆润，保持呼吸感，与背景足够对比 */
    .tagline{
      margin: clamp(12px, 2vh, 24px) 0 0 0;
      color: var(--coffee-soft);
      font-size: clamp(18px, 3.2vw, 56px); /* 约48–60px上限，随视口缩放 */
      font-weight: 500;
      letter-spacing: 0.02em;
      text-wrap: balance;
      text-shadow: 0 1px 2px rgba(255,255,255,0.35), 0 1px 8px rgba(90,58,43,0.20);
    }

    /* 底部信息区域（可选）：若无信息可隐藏，这里先保留最小呼吸占位 */
    footer{
      margin-top:auto;
      width:100%;
      display:flex;
      justify-content:center;
      align-items:flex-end;
      gap: 18px;
      min-height: clamp(8px, 2vh, 24px); /* 保持底部呼吸，不贴边 */
      color: rgba(42,31,25,0.75);
      font-size: clamp(12px, 1.6vw, 24px);
      text-shadow: 0 1px 2px rgba(255,255,255,0.35);
    }

    /* 可访问性：键盘聚焦可见（若后续添加链接等） */
    :focus-visible{
      outline: 3px solid rgba(216,176,112,0.9);
      outline-offset: 3px;
      border-radius: 6px;
    }

    /* 小屏适配微调 */
    @media (max-width: 420px){
      :root { --safe-gap: 28px; }
      .brand{ letter-spacing: 0.01em; }
      .tagline{ font-weight: 600; }
    }
  </style>
</head>
<body>
  <div class="stage" aria-label="晨光咖啡馆品牌海报">
    <figure class="poster" role="img" aria-label="温馨精致的咖啡厅服务环境背景，适合作为品牌海报主视觉。">
      <div class="bg" aria-hidden="true">
        <!-- 背景主图：来自上一环节生成（无文字、暖色调、竖版） -->
        <img src="kafei_step2_generation_output0.png" alt="温暖晨光氛围的咖啡厅服务环境，木质桌椅、咖啡杯与绿色植物，暖黄色调。" />
      </div>

      <div class="content">
        <header>
          <!-- 主标题：店名“晨光咖啡馆”，采用温暖精致风格，置顶显眼 -->
          <h1 class="brand">晨光咖啡馆</h1>
          <!-- 副标题：依据设计建议的暖色短文案；如需修改请直接替换此行文本 -->
          <p class="tagline">遇见生活的晨光，悦享醇香咖啡</p>
        </header>

        <main aria-hidden="true">
          <!-- 预留主视觉中部留白，避免与主体重叠；此处不放置额外元素 -->
        </main>

        <footer>
          <!-- 可选底部信息区：如营业时间/地址/二维码等（当前未提供具体文案，故不展示具体信息） -->
          <!-- 如需添加：请在此处插入简短文字或二维码图片，注意不遮挡主图主体 -->
        </footer>
      </div>
    </figure>
  </div>
</body>
</html>
